<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تفسير القرآن | ghassanai.dev</title>
  <meta name="description" content="قارئ تفسير القرآن الكريم — كل صفحة بتفسير مختصر من أهل السنة" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Noto+Sans+Arabic:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="quran.css" />
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5YN2YGC47K"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-5YN2YGC47K');
  </script>
</head>
<body>

  <!-- ── Header ─────────────────────────────────────── -->
  <header class="site-header">
    <a class="site-brand" href="index.html" aria-label="الرجوع إلى الصفحة الرئيسية">
      <span class="brand-mark" aria-hidden="true">GO</span>
      <span class="brand-copy">
        <strong>Ghassan Obeid</strong>
        <small>AI, Web3, and clean builds</small>
      </span>
    </a>

    <nav class="site-nav" aria-label="التنقل الرئيسي">
      <a href="index.html">الرئيسية</a>
      <a href="index.html#about">عن غسان</a>
      <a href="index.html#journey">المسيرة</a>
      <a href="quran.html" class="active">القرآن</a>
      <a href="index.html#contact">تواصل</a>
    </nav>

    <div class="site-actions">
      <button class="theme-toggle" type="button" aria-pressed="false" aria-label="تبديل المظهر">
        <span class="theme-toggle-icon" aria-hidden="true">☾</span>
        <span class="theme-toggle-text">Dark</span>
      </button>
      <a class="nav-cta" href="index.html#contact">تواصل</a>
    </div>
  </header>

  <!-- ── Main ───────────────────────────────────────── -->
  <main class="quran-main">

    <h1 class="quran-title">📖 تفسير القرآن الكريم</h1>
    <p class="quran-subtitle">٦٠٤ صفحة · مختصر من تفسير ابن كثير · أهل السنة والجماعة</p>

    <!-- Progress bar -->
    <div class="progress-track" aria-hidden="true">
      <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>

    <!-- Page jump -->
    <div class="page-jump">
      <label for="pageInput">انتقل إلى صفحة:</label>
      <input
        type="number"
        id="pageInput"
        min="1"
        max="604"
        placeholder="١–٦٠٤"
        aria-label="رقم الصفحة"
      />
      <button class="jump-btn" id="jumpBtn" type="button">اذهب</button>
    </div>

    <!-- Tafsir card -->
    <div class="tafsir-card fade-up" id="tafsirCard" role="region" aria-live="polite" aria-label="محتوى التفسير">
      <div class="card-meta">
        <span class="card-page-badge" id="pageBadge">الصفحة 1</span>
        <div class="card-meta-right">
          <div class="card-surah" id="surahName">—</div>
          <div class="card-juz" id="juzNum">الجزء —</div>
        </div>
      </div>

      <div class="tafsir-label">التفسير المختصر</div>
      <p class="tafsir-text" id="tafsirText">...</p>

      <a class="tafsir-link" id="tafsirLink" href="#" target="_blank" rel="noopener noreferrer">
        📚 اقرأ التفسير الكامل (ابن كثير) ←
      </a>
    </div>

    <!-- Navigation -->
    <div class="page-nav">
      <button class="page-nav-btn" id="prevBtn" type="button" aria-label="الصفحة السابقة">
        ← السابقة
      </button>

      <span class="page-counter" id="pageCounter">1 / 604</span>

      <button class="page-nav-btn" id="nextBtn" type="button" aria-label="الصفحة التالية">
        التالية →
      </button>
    </div>

  </main>

  <!-- ── Footer ─────────────────────────────────────── -->
  <footer class="site-footer">
    <p>بُني بالحب لوجه الله · <a href="index.html" style="color: var(--accent); text-decoration: none;">ghassanai.dev</a></p>
  </footer>

  <!-- ── Scripts ────────────────────────────────────── -->
  <script src="quran-data.js"></script>
  <script>
    /* ── State ───────────────────────────── */
    const TOTAL = 604;
    let currentPage = 1;

    /* ── DOM refs ────────────────────────── */
    const pageBadge   = document.getElementById('pageBadge');
    const surahName   = document.getElementById('surahName');
    const juzNum      = document.getElementById('juzNum');
    const tafsirText  = document.getElementById('tafsirText');
    const tafsirLink  = document.getElementById('tafsirLink');
    const pageCounter = document.getElementById('pageCounter');
    const progressFill= document.getElementById('progressFill');
    const prevBtn     = document.getElementById('prevBtn');
    const nextBtn     = document.getElementById('nextBtn');
    const pageInput   = document.getElementById('pageInput');
    const jumpBtn     = document.getElementById('jumpBtn');
    const tafsirCard  = document.getElementById('tafsirCard');

    /* ── Render a page ───────────────────── */
    function render(pageNum) {
      pageNum = Math.max(1, Math.min(TOTAL, pageNum));
      currentPage = pageNum;

      const data = QURAN_PAGES[pageNum - 1];
      if (!data) return;

      /* animate card */
      tafsirCard.classList.remove('fade-up');
      void tafsirCard.offsetWidth; /* reflow */
      tafsirCard.classList.add('fade-up');

      pageBadge.textContent   = 'الصفحة ' + pageNum;
      surahName.textContent   = data.surahName;
      juzNum.textContent      = 'الجزء ' + data.juz;
      tafsirText.textContent  = data.tafsir;
      tafsirLink.href         = data.link;
      pageCounter.textContent = pageNum + ' / ' + TOTAL;

      prevBtn.disabled = pageNum === 1;
      nextBtn.disabled = pageNum === TOTAL;

      const pct = ((pageNum - 1) / (TOTAL - 1)) * 100;
      progressFill.style.width = pct.toFixed(2) + '%';

      /* save progress */
      try { localStorage.setItem('quranPage', pageNum); } catch(e) {}

      /* update URL hash */
      history.replaceState(null, '', '#' + pageNum);
    }

    /* ── Event listeners ─────────────────── */
    prevBtn.addEventListener('click', () => render(currentPage - 1));
    nextBtn.addEventListener('click', () => render(currentPage + 1));

    jumpBtn.addEventListener('click', () => {
      const v = parseInt(pageInput.value, 10);
      if (v >= 1 && v <= TOTAL) render(v);
      pageInput.value = '';
    });

    pageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') jumpBtn.click();
    });

    /* ── Theme toggle ────────────────────── */
    const themeBtn  = document.querySelector('.theme-toggle');
    const themeIcon = themeBtn.querySelector('.theme-toggle-icon');
    const themeText = themeBtn.querySelector('.theme-toggle-text');

    function applyTheme(theme) {
      document.body.dataset.theme = theme;
      const isLight = theme === 'light';
      themeIcon.textContent = isLight ? '☀︎' : '☾';
      themeText.textContent = isLight ? 'Light' : 'Dark';
      themeBtn.setAttribute('aria-pressed', isLight ? 'true' : 'false');
      try { localStorage.setItem('theme', theme); } catch(e) {}
    }

    themeBtn.addEventListener('click', () => {
      applyTheme(document.body.dataset.theme === 'light' ? 'dark' : 'light');
    });

    /* ── Init ────────────────────────────── */
    (function init() {
      /* restore theme */
      try {
        const t = localStorage.getItem('theme');
        if (t) applyTheme(t);
      } catch(e) {}

      /* determine start page: URL hash → localStorage → 1 */
      let start = 1;
      const hash = parseInt(location.hash.slice(1), 10);
      if (hash >= 1 && hash <= TOTAL) {
        start = hash;
      } else {
        try {
          const saved = parseInt(localStorage.getItem('quranPage'), 10);
          if (saved >= 1 && saved <= TOTAL) start = saved;
        } catch(e) {}
      }
      render(start);
    })();
  </script>

</body>
</html>
